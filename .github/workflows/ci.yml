name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build & Test (CPU only)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Clippy (CPU feature set)
        run: cargo clippy --features cpu -- -D warnings

      - name: Build (release, CPU)
        run: cargo build --release --features cpu

      - name: Run tests
        run: cargo test --features cpu -- --nocapture

      - name: Run benchmarks (smoke test, 1 iter)
        run: cargo bench --features cpu --bench gemv_bench -- --warm-up-time 0 --measurement-time 1

  docs:
    name: Check documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --no-deps --features cpu
